<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light dark">
<!-- KaTeX CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<!-- Highlight.js themes -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
<style>
    :root {
        --text: #24292f;
        --bg: #ffffff;
        --code-bg: #f6f8fa;
        --border: #d0d7de;
        --link: #007aff;
        --blockquote: #656d76;
    }
    @media (prefers-color-scheme: dark) {
        :root {
            --text: #e6edf3;
            --bg: #0d1117;
            --code-bg: #161b22;
            --border: #30363d;
            --link: #0a84ff;
            --blockquote: #8b949e;
        }
    }
    * { box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
        background: transparent;
        max-width: 100%;
        padding: 16px 24px;
        margin: 0;
        word-wrap: break-word;
    }
    h1, h2, h3, h4, h5, h6 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        line-height: 1.25;
    }
    h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    h3 { font-size: 1.25em; }
    p { margin-top: 0; margin-bottom: 16px; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code {
        padding: 0.2em 0.4em;
        margin: 0;
        font-size: 85%;
        background: var(--code-bg);
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    pre {
        padding: 16px;
        overflow: auto;
        font-size: 85%;
        line-height: 1.45;
        background: var(--code-bg);
        border-radius: 6px;
        margin-bottom: 16px;
    }
    pre code {
        padding: 0;
        background: transparent;
        border-radius: 0;
    }
    /* Override highlight.js background to use our theme */
    pre code.hljs {
        background: transparent;
        padding: 0;
    }
    blockquote {
        margin: 0 0 16px 0;
        padding: 0 1em;
        color: var(--blockquote);
        border-left: 0.25em solid var(--border);
    }
    ul, ol { padding-left: 2em; margin-bottom: 16px; }
    li + li { margin-top: 0.25em; }
    hr {
        height: 0.25em;
        padding: 0;
        margin: 24px 0;
        background-color: var(--border);
        border: 0;
    }
    img { max-width: 100%; height: auto; }
    table {
        border-spacing: 0;
        border-collapse: collapse;
        margin-bottom: 16px;
    }
    table th, table td {
        padding: 6px 13px;
        border: 1px solid var(--border);
    }
    table th { font-weight: 600; }
    table th {
        background: var(--code-bg);
    }
    del { text-decoration: line-through; }
    /* Task list checkboxes */
    li > input[type="checkbox"] {
        margin-right: 0.4em;
        vertical-align: middle;
        position: relative;
        top: -1px;
    }
    li:has(> input[type="checkbox"]) {
        list-style: none;
        margin-left: -1.4em;
    }
    /* Frontmatter */
    table.frontmatter {
        width: 100%;
        margin-bottom: 20px;
        font-size: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        background: var(--code-bg);
    }
    table.frontmatter td {
        padding: 4px 10px;
        border: none;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
    }
    table.frontmatter tr:last-child td { border-bottom: none; }
    table.frontmatter .fm-key {
        font-weight: 600;
        white-space: nowrap;
        width: 1%;
        opacity: 0.7;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }
    /* Mermaid diagrams */
    .mermaid {
        text-align: center;
        margin: 16px 0;
    }
    .mermaid svg {
        max-width: 100%;
    }
    /* KaTeX overrides */
    .katex-display {
        margin: 1em 0;
        overflow-x: auto;
        overflow-y: hidden;
    }
    #content { padding-bottom: 45vh; }
    #content:empty::before {
        content: "No content to preview";
        color: var(--blockquote);
        font-style: italic;
    }
</style>
<!-- JS Libraries (blocking so they're ready before updateContent is called) -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
<div id="content"></div>
<script>
(function() {
    // Initialize mermaid with theme detection
    if (typeof mermaid !== 'undefined') {
        var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default' });
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            mermaid.initialize({ startOnLoad: false, theme: e.matches ? 'dark' : 'default' });
        });
    }
})();

var _mc = 0;

function processContent() {
    var el = document.getElementById('content');
    if (!el || !el.innerHTML.trim()) return;

    // 1. Mermaid: replace ```mermaid code blocks with rendered diagrams
    if (typeof mermaid !== 'undefined') {
        var blocks = el.querySelectorAll('pre > code[class*="mermaid"]');
        for (var i = 0; i < blocks.length; i++) {
            var pre = blocks[i].parentElement;
            var div = document.createElement('div');
            div.className = 'mermaid';
            div.id = 'mm' + (_mc++);
            div.textContent = blocks[i].textContent;
            pre.replaceWith(div);
        }
        if (el.querySelectorAll('.mermaid').length > 0) {
            try { mermaid.run(); } catch(e) { console.warn('Mermaid error:', e); }
        }
    }

    // 2. Syntax highlighting for code blocks
    if (typeof hljs !== 'undefined') {
        el.querySelectorAll('pre code').forEach(function(block) {
            hljs.highlightElement(block);
        });
    }

    // 3. KaTeX math rendering
    if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(el, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\[', right: '\\]', display: true},
                {left: '\\(', right: '\\)', display: false}
            ],
            throwOnError: false,
            ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        });
    }
}

function updateContent(html) {
    document.getElementById('content').innerHTML = html;
    processContent();
}

// Auto-process if content already present (standalone HTML export)
processContent();
</script>
</body>
</html>
