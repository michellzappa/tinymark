name: TinyMark
options:
  bundleIdPrefix: com.tinymark
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: "0.4.0"
  TinyKit:
    path: Packages/TinyKit

targets:
  TinyMark:
    type: application
    platform: macOS
    sources:
      - path: Sources/TinyMark
        excludes:
          - "Resources"
      - path: Sources/TinyMark/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/TinyMark/Resources/preview.html
        buildPhase: resources
      - path: Sources/TinyMark/Resources/AppIcon.icon
        buildPhase: resources
      - path: Sources/TinyMark/Resources/DocIcons
        buildPhase: resources
    info:
      path: Sources/TinyMark/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            CFBundleTypeIconFile: doc_md
            LSItemContentTypes:
              - net.daringfireball.markdown
            CFBundleTypeExtensions:
              - md
              - markdown
              - mdown
              - mkd
              - mkdn
              - mdx
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
            CFBundleTypeExtensions:
              - txt
              - text
        LSApplicationCategoryType: public.app-category.productivity
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
                - mkdn
                - mdx
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinymark.app
        PRODUCT_NAME: "TinyMark"
        MARKETING_VERSION: "1.4.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        DEVELOPMENT_TEAM: 992N457T8D
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: TinyMark.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: TinyKit
        product: TinyKit

schemes:
  TinyMark:
    build:
      targets:
        TinyMark: all
