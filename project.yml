name: LittleMark
options:
  bundleIdPrefix: com.littlemark
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: "0.4.0"

targets:
  LittleMark:
    type: application
    platform: macOS
    sources:
      - path: Sources/LittleMark
        excludes:
          - "Resources"
      - path: Sources/LittleMark/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/LittleMark/Resources/preview.html
        buildPhase: resources
      - path: AppIcon.icon
        buildPhase: resources
    info:
      path: Sources/LittleMark/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            CFBundleTypeExtensions:
              - md
              - markdown
              - txt
              - text
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.littlemark.app
        PRODUCT_NAME: "Little Mark"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
    dependencies:
      - package: swift-markdown
        product: Markdown
